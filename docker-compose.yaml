  auth-service-build:
    build:
      context: services/auth_service
      dockerfile: docker/prod/Dockerfile
    networks:
      - dev
    ports:
      - "8081:8081" # REST
      - "50051:50051" # gRPC
    depends_on:
      - auth-bd

  auth-bd:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 5QFJOC
      POSTGRES_DB: app

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app" ]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - authDb:/var/lib/postgresql/data
    networks:
      - dev
    ports:
      - "5432:5432"

  notification-service:
    build:
      context: services/notification_service
      dockerfile: docker/Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ./services/notification_service:/app
    networks:
      - dev

  notification-bd:
    image: postgres:16
    environment:
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: 8QSDGT9H
      POSTGRES_DB: notification
    volumes:
      - notificationDb:/var/lib/postgresql/data
    networks:
      - dev
    ports:
      - "5433:5432"

  fake-kafka-service:
    build:
      context: services/fake_kafka_service
      dockerfile: docker/Dockerfile
    networks:
      - dev
    volumes:
      - ./services/fake_kafka_service:/app
    depends_on:
      - kafka

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - dev

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - dev


networks:
  dev:
    name: dev

volumes:
  uploads:
  authDb:
    driver: local
  notificationDb:
    driver: local






