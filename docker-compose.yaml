  auth-service-build:
    build:
      context: services/auth_service
      dockerfile: docker/prod/Dockerfile
    networks:
      - dev
    ports:
      - "8081:8081" # REST
      - "50051:50051" # gRPC
    depends_on:
      - auth-bd

  auth-bd:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 5QFJOC
      POSTGRES_DB: app

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app" ]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - authDb:/var/lib/postgresql/data
    networks:
      - dev
    ports:
      - "5432:5432"

  notification-service:
    build:
      context: services/notification_service
      dockerfile: docker/Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ./services/notification_service:/app
    networks:
      - dev

  notification-bd:
    image: postgres:16
    environment:
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: 8QSDGT9H
      POSTGRES_DB: notification
    volumes:
      - notificationDb:/var/lib/postgresql/data
    networks:
      - dev
    ports:
      - "5433:5432"

networks:
  dev:
    name: dev

volumes:
  uploads:
  authDb:
    driver: local
  notificationDb:
    driver: local






